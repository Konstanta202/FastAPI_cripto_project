events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Скрываем версию nginx
    server_tokens off;

    # Максимальный размер тела запроса
    client_max_body_size 10M;

    # ===== ОСНОВНЫЕ НАСТРОЙКИ ПРОКСИ =====
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ===== НАСТРОЙКИ КЕШИРОВАНИЯ =====
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=1g inactive=60m use_temp_path=off;

    # ===== СЖАТИЕ (GZIP) =====
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/javascript application/xml+rss 
               application/json image/svg+xml;

    # ===== ГЛАВНЫЙ СЕРВЕР =====
    server {
        # Слушаем 80 порт (HTTP)
        listen 80;
        server_name _;  # Любой IP адрес

        # Логи (для отладки)
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        # ===== ФРОНТЕНД =====
        # Все запросы к корню сайта направляем на фронтенд
        location / {
            proxy_pass http://frontend-app:5173;
            proxy_http_version 1.1;
            
            # Важно для WebSocket (нужен для hot-reload Vite)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Стандартные заголовки
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Отключаем кеширование для HTML (чтобы всегда видеть свежие изменения)
            proxy_cache off;
            expires -1;
        }

        # ===== СТАТИЧЕСКИЕ ФАЙЛЫ (с долгим кешированием) =====
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            proxy_pass http://frontend-app:5173;
            proxy_set_header Host $host;
            
            # Кеширование на год (для производительности)
            expires 1y;
            add_header Cache-Control "public, immutable";
            
            # Логировать не надо (чтобы не засорять логи)
            access_log off;
        }

        # ===== API БЭКЕНДА =====
        # Все запросы, начинающиеся с /api/, перенаправляем на бэкенд
        location /api/ {
            # Убираем /api из пути при передаче на бэкенд
            rewrite ^/api/(.*) /$1 break;
            
            # Прокси на бэкенд
            proxy_pass http://backend-app:8000;
            
            # Заголовки
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CORS заголовки (на всякий случай)
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            
            # Preflight requests (OPTIONS)
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # ===== SWAGGER UI =====
        # Для доступа к документации API
        location /docs {
            proxy_pass http://backend-app:8000/docs;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://backend-app:8000/redoc;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend-app:8000/openapi.json;
            proxy_set_header Host $host;
        }

        # ===== HEALTH CHECK =====
        location /health {
            access_log off;
            return 200 '{"status": "healthy", "timestamp": "$time_iso8601"}';
            add_header Content-Type application/json;
        }

        # ===== ОБРАБОТКА ОШИБОК =====
        # Если файл не найден, отправляем на фронтенд (для SPA роутинга)
        error_page 404 =200 /index.html;
        
        # Страницы ошибок
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}