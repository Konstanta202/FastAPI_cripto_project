events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    server_tokens off;
    client_max_body_size 10M;

    # Ресолвер для Docker (обязательно!)
    resolver 127.0.0.11 valid=30s;

    # Основные заголовки
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Сжатие
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    server {
        listen 80;
        server_name _;

        # ФРОНТЕНД - красиво и просто
        location / {
            proxy_pass http://frontend-app:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # API - элегантное решение (без rewrite!)
        location /api/ {
            # Просто добавляем /api в конце
            proxy_pass http://backend-app:8000/api/;
            
            # CORS
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            
            # OPTIONS запросы
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
                add_header Access-Control-Allow-Headers "Content-Type";
                return 204;
            }
        }

        # Документация (опционально)
        location /docs {
            proxy_pass http://backend-app:8000/docs;
        }
    }
}