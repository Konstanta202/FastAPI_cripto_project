events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    server_tokens off;
    client_max_body_size 10M;

    resolver 127.0.0.11 valid=30s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Убираем default server который показывает приветствие
    server {
        listen 80;
        server_name _;  # Ловит все запросы

        # Фронтенд - ВСЕ запросы сюда
        location / {
            proxy_pass http://frontend-app:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            
            # Важно для Vite
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Отключаем буферизацию
            proxy_buffering off;
        }

        # API
        location /api/ {
            proxy_pass http://backend-app:8000/;
            proxy_set_header Host $host;
            rewrite ^/api/(.*) /$1 break;
        }

        # Документация
        location /docs {
            proxy_pass http://backend-app:8000/docs;
        }
        
        location /openapi.json {
            proxy_pass http://backend-app:8000/openapi.json;
        }
    }
}