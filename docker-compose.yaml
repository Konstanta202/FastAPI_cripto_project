version: "3.9"

services:
  backend-app:
    container_name: backend-app
    build: ./backend
    env_file:
      - backend/.env
    ports:
      - "8000:8000"
    networks:
      - app-network

  frontend-app:
    container_name: frontend-app
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=/api
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy-telecom
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    depends_on:
      - frontend-app
      - backend-app

    restart: unless-stopped

networks:
  app-network:
    driver: bridge